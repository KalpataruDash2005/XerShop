name: Pull Request Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  quick-check:
    name: Quick Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for TODO comments
        run: |
          if grep -r "TODO\|FIXME\|XXX" --include="*.java" --include="*.ts" --include="*.tsx" printhub-backend/src printhub-web/src; then
            echo "Warning: Found TODO/FIXME comments"
          fi

      - name: Check for hardcoded secrets
        run: |
          if grep -rE "(password|secret|api_key|token)\s*=\s*['\"][^'\"]+['\"]" --include="*.java" --include="*.ts" --include="*.tsx" printhub-backend/src printhub-web/src 2>/dev/null; then
            echo "Warning: Potential hardcoded secrets found"
            exit 1
          fi

      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-review:
    name: Code Review Suggestions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: PR Size Check
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const totalChanges = changedFiles.data.reduce((acc, file) => {
              return acc + (file.additions || 0) + (file.deletions || 0);
            }, 0);

            if (totalChanges > 1000) {
              core.warning(`Large PR detected: ${totalChanges} lines changed. Consider breaking into smaller PRs.`);
            }

            core.info(`PR Statistics:
            - Files changed: ${changedFiles.data.length}
            - Total changes: ${totalChanges}
            `);
