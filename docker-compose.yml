version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: printhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: printhub
      MYSQL_USER: printhub
      MYSQL_PASSWORD: printhub123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./printhub-backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - printhub-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: printhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - printhub-network

  # Backend API
  backend:
    build:
      context: ./printhub-backend
      dockerfile: Dockerfile
    container_name: printhub-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/printhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
      SPRING_DATASOURCE_USERNAME: printhub
      SPRING_DATASOURCE_PASSWORD: printhub123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: dev-secret-key-must-be-at-least-32-characters-long
      RAZORPAY_KEY_ID: rzp_test_dev
      RAZORPAY_KEY_SECRET: dev_secret
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - printhub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Frontend Web
  web:
    build:
      context: ./printhub-web
      dockerfile: Dockerfile
    container_name: printhub-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - printhub-network

  # Adminer (Database GUI)
  adminer:
    image: adminer:latest
    container_name: printhub-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - printhub-network

volumes:
  mysql_data:
  redis_data:

networks:
  printhub-network:
    driver: bridge
