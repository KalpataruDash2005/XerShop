version: '3.8'

services:
  # Backend API (H2 in-memory database embedded)
  backend:
    build:
      context: ./printhub-backend
      dockerfile: Dockerfile
    container_name: printhub-backend
    user: root
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: dev-secret-key-must-be-at-least-32-characters-long
      RAZORPAY_KEY_ID: rzp_test_dev
      RAZORPAY_KEY_SECRET: dev_secret
    ports:
      - "8080:8080"
    volumes:
      - h2-data:/app/db
    networks:
      - printhub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Frontend Web
  web:
    build:
      context: ./printhub-web
      dockerfile: Dockerfile
    container_name: printhub-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - printhub-network

  # Adminer (Database GUI - for H2 via web console at /h2-console on backend)
  adminer:
    image: adminer:latest
    container_name: printhub-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: backend
    depends_on:
      - backend
    networks:
      - printhub-network

networks:
  printhub-network:
    driver: bridge

volumes:
  h2-data:
